services:
  web:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://dataprune:${POSTGRES_PASSWORD}@db:5432/dataprune
    volumes:
      - ./profiles.yaml:/app/profiles.yaml
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: dataprune
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dataprune
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dataprune" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
